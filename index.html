<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abaixando App - Download Direto</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: white; }
        .container { background: #161616; padding: 30px; border-radius: 25px; text-align: center; width: 95%; max-width: 420px; border: 2px solid #FF4500; box-shadow: 0 10px 40px rgba(255, 69, 0, 0.3); }
        h2 { color: #FF4500; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-size: 26px; }
        .sub { font-size: 13px; color: #888; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; color: #FF4500; font-weight: bold; margin-left: 5px; }
        input { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #00ff00; box-sizing: border-box; font-size: 14px; outline: none; text-align: center; }
        .btn { background: #FF4500; padding: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; border: none; color: white; font-size: 16px; text-transform: uppercase; }
        #resultado { background: #222; padding: 20px; border-radius: 15px; margin-top: 25px; border: 1px dashed #FF4500; display: none; }
        .btn-down { background: #008000; margin-top: 10px; width: 100%; padding: 18px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ABAIXANDO APP</h2>
        <p class="sub">Download Direto Sem Avisos</p>
        <div class="input-group">
            <label>COLE O LINK DO DRIVE:</label>
            <input type="text" id="driveLink" placeholder="Cole o link do arquivo...">
        </div>
        <button class="btn" onclick="gerarDownload()" style="width: 100%;">GERAR DOWNLOAD AUTOMÁTICO</button>

        <div id="resultado">
            <p style="font-size: 14px; color: #FF4500; font-weight: bold;">✅ LINK CONFIGURADO!</p>
            <input type="text" id="linkFinal" readonly>
            <button class="btn-down" onclick="baixarAgora()">BAIXAR AGORA</button>
        </div>
    </div>

    <script>
        // Link do seu Worker oficial
        const workerUrl = "https://abaixandoapp.roneiltonsouza2019.workers.dev/";

        function gerarDownload() {
            const link = document.getElementById('driveLink').value;
            // Pega o ID do arquivo independente do formato do link
            const regex = /(?:https?:\/\/)?(?:drive\.google\.com\/(?:file\/d\/|open\?id=))([a-zA-Z0-9_-]+)/;
            const match = link.match(regex);

            if (match && match[1]) {
                const id = match[1];
                const final = workerUrl + "?id=" + id;
                document.getElementById('linkFinal').value = final;
                document.getElementById('resultado').style.display = "block";
            } else {
                alert("Por favor, cole um link válido do Google Drive.");
            }
        }

        function baixarAgora() {
            const url = document.getElementById("linkFinal").value;
            if (url) {
                // Dispara o download imediatamente
                window.location.href = url;
            }
        }
    </script>
</body>
</html>
